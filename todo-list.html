<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투두 리스트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 28px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #todoInput {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    #todoInput:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    #todoList {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 5px;
      margin-bottom: 8px;
      transition: background 0.3s;
    }

    .todo-item.completed {
      background: #e8f5e9;
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-text {
      flex: 1;
      color: #333;
      font-size: 16px;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .delete-btn {
      padding: 6px 12px;
      background: #ff6b6b;
      font-size: 14px;
    }

    .delete-btn:hover {
      background: #ff5252;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 투두 리스트</h1>

    <div class="input-group">
      <input
        type="text"
        id="todoInput"
        placeholder="할 일을 입력하세요..."
        autocomplete="off"
      >
      <button onclick="addTodo()">추가</button>
    </div>

    <ul id="todoList"></ul>
    <div id="emptyMessage" class="empty-message">아직 할 일이 없습니다 🎉</div>
  </div>

  <script>
    const todoInput = document.getElementById('todoInput');
    const todoList = document.getElementById('todoList');
    const emptyMessage = document.getElementById('emptyMessage');

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;

      const li = document.createElement('li');
      li.className = 'todo-item';
      li.innerHTML = `
        <input type="checkbox" onchange="toggleTodo(this)">
        <span class="todo-text">${escapeHtml(text)}</span>
        <button class="delete-btn" onclick="deleteTodo(this)">삭제</button>
      `;

      todoList.appendChild(li);
      todoInput.value = '';
      todoInput.focus();
      updateEmptyMessage();
    }

    function toggleTodo(checkbox) {
      checkbox.parentElement.classList.toggle('completed');
    }

    function deleteTodo(btn) {
      btn.parentElement.remove();
      updateEmptyMessage();
    }

    function updateEmptyMessage() {
      emptyMessage.style.display = todoList.children.length === 0 ? 'block' : 'none';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    todoInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    updateEmptyMessage();
  </script>
</body>
</html>
